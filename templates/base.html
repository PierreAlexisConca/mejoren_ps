<body>
    <header class="bg-white shadow-custom-light fixed w-full z-50">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-3xl header-logo cursor-pointer">PALEES</div>
            <div class="hidden md:flex space-x-8 lg:space-x-12">
                <a href="/"
                    class="nav-link text-palees-text-dark hover:text-palees-yellow font-medium transition-colors duration-300 active">Inicio</a>
                <details class="relative group" onmouseover="this.setAttribute('open','')"
                    onmouseout="this.removeAttribute('open')">
                    <summary
                        class="nav-link text-palees-text-dark hover:text-palees-yellow font-medium transition-colors duration-300 flex items-center cursor-pointer list-none">
                        Categorías <i class="fas fa-chevron-down text-xs ml-2"></i>
                    </summary>
                    <div
                        class="absolute bg-white shadow-custom-medium py-2 rounded-md z-10 min-w-[160px] top-full left-0 overflow-hidden transition-all duration-300 ease-out max-h-0 group-open:max-h-96">
                        <a href="#"
                            class="block px-4 py-2 text-palees-text-dark hover:bg-palees-gray-light transition-colors duration-200">Ropa</a>
                        <a href="#"
                            class="block px-4 py-2 text-palees-text-dark hover:bg-palees-gray-light transition-colors duration-200">Accesorios</a>
                        <a href="#"
                            class="block px-4 py-2 text-palees-text-dark hover:bg-palees-gray-light transition-colors duration-200">Calzado</a>
                    </div>
                </details>
                <a href="#"
                    class="nav-link text-palees-text-dark hover:text-palees-yellow font-medium transition-colors duration-300">Ofertas</a>
                <a href="#"
                    class="nav-link text-palees-text-dark hover:text-palees-yellow font-medium transition-colors duration-300">Contactanos</a>
                <a href="#"
                    class="nav-link text-palees-text-dark hover:text-palees-yellow font-medium transition-colors duration-300">Mi
                    cuenta</a>
            </div>
            <div class="flex items-center">
                <a href="#"
                    class="cart-btn bg-palees-yellow text-palees-blue rounded-full px-5 py-2 flex items-center space-x-2 font-semibold text-sm hover:bg-yellow-500 transition-colors duration-300 shadow-sm">
                    <span>carrito</span>
                    <i class="fas fa-shopping-cart text-lg"></i>
                </a>
            </div>
            <div class="md:hidden">
                <button class="text-gray-600 hover:text-gray-900 focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
        </nav>
    </header>

    <main class="pt-20">
    </main>

    <footer class="bg-palees-blue text-palees-gray-light py-8 mt-16 shadow-inner">
    </footer>

    <script src="{{ url_for('static', filename='js/carrusel.js') }}"></script>
</body>

</html>
